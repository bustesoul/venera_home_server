  <meta charset="utf-8">

<div id="root"></div>
<script type="text/babel">

/* ═══════════════════════════════════════════════════════════
   Destructure React & Ant Design
   ═══════════════════════════════════════════════════════════ */
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const {
  ConfigProvider, Layout, Tabs, Card, Form, Input, InputNumber, Select,
  Button, Table, Tag, Alert, Modal, Space, Row, Col, Statistic,
  Checkbox, Typography, Divider, Popconfirm, Descriptions, Switch,
  Flex, Tooltip,
} = antd;
const { Header, Content } = Layout;
const { TextArea, Password, Search } = Input;
const { Text, Title } = Typography;
const { darkAlgorithm, defaultAlgorithm } = antd.theme;

/* ═══════════════════════════════════════════════════════════
   Utility Functions (ported from original)
   ═══════════════════════════════════════════════════════════ */
function normalizeQuery(value) {
  return String(value || '').trim().toLowerCase();
}

function buildSearchText(parts) {
  return parts.filter(Boolean).join(' ').toLowerCase();
}

function matchesQuery(parts, query) {
  if (!query) return true;
  return buildSearchText(parts).includes(query);
}

function aggregateAdjacentItems(items, keyFn) {
  const groups = [];
  for (const item of Array.isArray(items) ? items : []) {
    const key = keyFn(item || {});
    const last = groups[groups.length - 1];
    if (last && last.key === key) { last.items.push(item); continue; }
    groups.push({ key, items: [item] });
  }
  return groups.map((group) => {
    const latest = group.items[0] || {};
    const earliest = group.items[group.items.length - 1] || latest;
    return {
      ...latest,
      _group_count: group.items.length,
      _group_first_job_id: earliest.job_id || '',
      _group_error_count: group.items.filter((e) => e && e.error).length,
    };
  });
}

function aggregateEHBotItems(items) {
  return aggregateAdjacentItems(items, (j) => `${j.status || ''}::${j.library_id || ''}::${j.remote_target_id || ''}`);
}

function aggregateJobsItems(items) {
  return aggregateAdjacentItems(items, (j) => `${j.kind || ''}::${j.status || ''}::${j.library_id || ''}`);
}

function aggregateJobHistoryItems(items) {
  const groups = [];
  for (const job of Array.isArray(items) ? items : []) {
    const last = groups[groups.length - 1];
    if (last && last.kind === (job.kind || '') && last.status === (job.status || '')) {
      last.items.push(job); continue;
    }
    groups.push({ kind: job.kind || '', status: job.status || '', items: [job] });
  }
  return groups.map((group) => {
    const latest = group.items[0] || {};
    const earliest = group.items[group.items.length - 1] || latest;
    return {
      ...latest,
      _group_count: group.items.length,
      _group_first_job_id: earliest.job_id || '',
      _group_first_updated_at: earliest.updated_at || earliest.requested_at || '',
      _group_last_job_id: latest.job_id || '',
      _group_last_updated_at: latest.updated_at || latest.requested_at || '',
      _group_error_count: group.items.filter((i) => i && i.error).length,
    };
  });
}

function formatJobProgress(job) {
  const p = [];
  if (job.path) p.push(job.path);
  if (job.examined || job.processed) p.push(`${job.processed || 0}/${job.examined || job.processed || 0}`);
  if (job.matched != null) p.push(`matched ${job.matched || 0}`);
  if (job.updated != null) p.push(`updated ${job.updated || 0}`);
  if (job.skipped != null) p.push(`skipped ${job.skipped || 0}`);
  if (job.unmatched != null) p.push(`unmatched ${job.unmatched || 0}`);
  return p.join(' / ') || '-';
}

function formatEHBotProgress(job) {
  return [`listed ${job.listed || 0}`, `eligible ${job.eligible || 0}`, `claimed ${job.claimed || 0}`, `imported ${job.imported || 0}`, `failed ${job.failed || 0}`].join(' | ');
}

function formatDateTime(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return value;
  return d.toLocaleString();
}

function formatTableSummary({ total, filtered, displayed, aggregated }) {
  const p = [`共 ${total} 条`];
  if (filtered != null && filtered !== total) p.push(`过滤后 ${filtered} 条`);
  p.push(`当前显示 ${displayed} 行`);
  if (aggregated) p.push('（已聚合）');
  return p.join(' / ');
}

function formatJobSources(job) {
  if (Array.isArray(job.sources) && job.sources.length > 0) return job.sources.join(', ');
  return job.source_id || '-';
}

function locatorKey(loc) {
  if (!loc || typeof loc !== 'object') return '';
  return `${loc.library_id || ''}::${loc.root_type || ''}::${loc.root_ref || ''}`;
}

function encodeLocator(loc) { return encodeURIComponent(JSON.stringify(loc || {})); }
function decodeLocator(enc) { try { return JSON.parse(decodeURIComponent(enc || '')) || {}; } catch (_) { return {}; } }

function guessTitleFromRecord(item) {
  if (!item) return '';
  if (item.title || item.title_jpn) return item.title || item.title_jpn;
  const kw = Array.isArray(item.hint?.keywords) ? [...item.hint.keywords] : [];
  kw.sort((a, b) => String(b).length - String(a).length);
  if (kw.length > 0) return kw[0];
  const parts = String(item.root_ref || item.folder_path || '').split('/').filter(Boolean);
  return parts.length ? parts[parts.length - 1] : '';
}

function buildSidecarTemplate(item) {
  const out = {};
  const guessed = guessTitleFromRecord(item);
  if (item?.root_type === 'series') {
    if (guessed) out.series = guessed;
    out.scan_mode = 'auto';
  } else if (guessed) {
    out.title = guessed;
  }
  if (item?.subtitle) out.subtitle = item.subtitle;
  if (Array.isArray(item?.artists) && item.artists.length > 0) out.authors = item.artists;
  if (Array.isArray(item?.tags) && item.tags.length > 0) out.tags = item.tags;
  if (item?.language) out.language = item.language;
  return JSON.stringify(out, null, 2);
}

function formatSidecarContent(raw, fallback) {
  try { return JSON.stringify(JSON.parse(raw || '{}'), null, 2); } catch (_) { return raw || fallback; }
}

function copyToClipboard(text, setStatus) {
  if (!text) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => setStatus?.(`已复制到剪贴板: ${text}`, 'ok'))
      .catch((e) => setStatus?.(`复制失败: ${e.message}`, 'err'));
  } else {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) setStatus?.(`已复制到剪贴板: ${text}`, 'ok');
      else setStatus?.('复制失败: 浏览器阻止了此操作', 'err');
    } catch (e) {
      setStatus?.(`复制异常: ${e.message}`, 'err');
    }
  }
}

function actionLabel(a) {
  return { lock: '锁定', unlock: '解锁', reset: '重置', enrich: '重新补全' }[a] || a;
}

function preferredTheme() {
  const stored = localStorage.getItem('venera_admin_theme');
  if (stored === 'dark' || stored === 'light') return stored;
  return window.matchMedia?.('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function loadPreferredTab() {
  const stored = localStorage.getItem('venera_admin_tab');
  return ['bot', 'metadata', 'jobs'].includes(stored) ? stored : 'bot';
}

/* ═══════════════════════════════════════════════════════════
   API Helper
   ═══════════════════════════════════════════════════════════ */
async function fetchJSON(url, token, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  if (options.body != null && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  const resp = await fetch(url, { ...options, headers });
  const text = await resp.text();
  let json = {};
  try { json = text ? JSON.parse(text) : {}; } catch (_) {}
  if (!resp.ok) throw new Error(json?.error?.message || `${resp.status} ${resp.statusText}`);
  return json.data;
}

/* ═══════════════════════════════════════════════════════════
   Small UI Components
   ═══════════════════════════════════════════════════════════ */
const StatusTag = ({ value }) => {
  const labels = { empty: '空', ready: '就绪', stale: '过期', error: '错误', missing: '缺失', locked: '已锁定', done: '完成', failed: '失败', running: '进行中', queued: '排队中', accepted: '已接收' };
  const colors = { done: 'success', ready: 'success', accepted: 'success', failed: 'error', error: 'error', missing: 'error', running: 'warning', stale: 'warning', locked: 'warning', queued: 'warning', empty: 'default' };
  return <Tag color={colors[value] || 'default'}>{labels[value] || value || '-'}</Tag>;
};

const Pill = ({ text, kind }) => {
  const color = kind === 'ok' ? 'success' : kind === 'err' ? 'error' : kind === 'warn' ? 'warning' : 'default';
  return <Tag color={color}>{text || '-'}</Tag>;
};

const GroupBadge = ({ record }) => {
  const count = Number(record._group_count || 1);
  if (count <= 1) return null;
  return (
    <div>
      <Tag color="warning">×{count}</Tag>
      <Text code style={{ fontSize: 12 }}>最早 {record._group_first_job_id || ''}</Text>
      {(record._group_error_count || 0) > 0 && (
        <Text type="secondary" style={{ fontSize: 12, marginLeft: 4 }}>含 {record._group_error_count} 条错误</Text>
      )}
    </div>
  );
};

const TagsCell = ({ item, setStatus }) => {
  const [expanded, setExpanded] = useState(false);
  const artists = Array.isArray(item.artists) ? item.artists.filter(Boolean) : [];
  let tags = Array.isArray(item.tags) ? item.tags.filter(Boolean) : [];
  const artistTags = tags.filter(t => t.startsWith('artist:'));
  tags = tags.filter(t => !t.startsWith('artist:'));
  const languageTags = tags.filter(t => t.startsWith('language:'));
  tags = tags.filter(t => !t.startsWith('language:'));
  const combinedArtists = [...new Set(
    (artists.length > 0 ? artists : artistTags.map(t => t.substring(7)))
      .map(a => String(a || '').trim()).filter(Boolean)
  )];
  const derivedLang = item.language || (languageTags.length > 0 ? languageTags[0].substring(9) : '');
  const visibleTags = expanded ? tags : tags.slice(0, 5);
  const hiddenCount = tags.length - 5;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
      <Text strong>{item.title || item.title_jpn || '(未匹配到标题)'}</Text>
      {item.subtitle && <Text type="secondary" className="mono" style={{ fontSize: 12 }}>{item.subtitle}</Text>}
      <Flex wrap="wrap" gap={4}>
        {derivedLang && <Tag color="red" style={{ cursor: 'pointer' }} onClick={() => copyToClipboard(derivedLang, setStatus)}>{derivedLang}</Tag>}
        {combinedArtists.map((a, i) => <Tag key={`a-${i}`} color="blue" style={{ cursor: 'pointer' }} onClick={() => copyToClipboard(a, setStatus)}>{a}</Tag>)}
        {visibleTags.map((t, i) => <Tag key={`t-${i}`} style={{ cursor: 'pointer' }} onClick={() => copyToClipboard(t, setStatus)}>{t}</Tag>)}
        {!expanded && hiddenCount > 0 && <Tag style={{ cursor: 'pointer' }} onClick={() => setExpanded(true)}>+{hiddenCount}</Tag>}
      </Flex>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   Context
   ═══════════════════════════════════════════════════════════ */
const AppCtx = React.createContext({});

/* ═══════════════════════════════════════════════════════════
   EH Bot Panel
   ═══════════════════════════════════════════════════════════ */
const EHBotPanel = () => {
  const {
    tokenRef, setStatus, ehbotStatus, ehbotConfig, ehbotJobs,
    refreshEhbotStatus, refreshEhbotJobs, loadEhbotConfig, refreshJobHistory,
  } = React.useContext(AppCtx);

  const [configForm] = Form.useForm();
  const [createForm] = Form.useForm();
  const [clearToken, setClearToken] = useState(false);
  const [configMeta, setConfigMeta] = useState({ config_path: '', writable: false, pull_token_configured: false, rewrite_warning: '', libraries: [] });
  const [jobsSearch, setJobsSearch] = useState('');
  const [jobsStatus, setJobsStatus] = useState('');
  const [jobsAggregate, setJobsAggregate] = useState(true);
  const [saving, setSaving] = useState(false);
  const [creating, setCreating] = useState(false);
  const [pulling, setPulling] = useState(false);

  const populateConfig = useCallback((data) => {
    if (!data) return;
    setConfigMeta({
      config_path: data.config_path || '',
      writable: !!data.writable,
      pull_token_configured: !!data.pull_token_configured,
      rewrite_warning: data.rewrite_warning || 'Pull Token 留空表示保持现状；勾选清空则移除已有 token。',
      libraries: data.libraries || [],
    });
    configForm.setFieldsValue({
      enabled: data.enabled,
      base_url: data.base_url || '',
      consumer_id: data.consumer_id || '',
      target_id: data.target_id || '',
      target_library_id: data.target_library_id || '',
      target_subdir: data.target_subdir || '',
      poll_interval_seconds: data.poll_interval_seconds || 60,
      lease_seconds: data.lease_seconds || 1800,
      download_timeout_seconds: data.download_timeout_seconds || 1800,
      max_jobs_per_poll: data.max_jobs_per_poll || 1,
      auto_rescan: data.auto_rescan,
      clear_pull_token: false,
      pull_token: '',
    });
    setClearToken(false);
  }, [configForm]);

  useEffect(() => { if (ehbotConfig) populateConfig(ehbotConfig); }, [ehbotConfig, populateConfig]);

  const handleLoadConfig = async () => {
    try {
      const data = await fetchJSON('/api/v1/admin/ehbot/config', tokenRef.current);
      populateConfig(data);
    } catch (err) {
      setConfigMeta(p => ({ ...p, writable: false }));
      setStatus(`EH Bot 配置加载失败：${err.message}`, 'err');
    }
  };

  const handleSaveConfig = async () => {
    setSaving(true);
    try {
      const v = configForm.getFieldsValue();
      const payload = {
        enabled: !!v.enabled,
        base_url: (v.base_url || '').trim(),
        pull_token: (v.pull_token || '').trim(),
        clear_pull_token: !!v.clear_pull_token,
        consumer_id: (v.consumer_id || '').trim(),
        target_id: (v.target_id || '').trim(),
        target_library_id: v.target_library_id || '',
        target_subdir: (v.target_subdir || '').trim(),
        poll_interval_seconds: Number(v.poll_interval_seconds || 0),
        lease_seconds: Number(v.lease_seconds || 0),
        download_timeout_seconds: Number(v.download_timeout_seconds || 0),
        auto_rescan: !!v.auto_rescan,
        max_jobs_per_poll: Number(v.max_jobs_per_poll || 0),
      };
      const data = await fetchJSON('/api/v1/admin/ehbot/config', tokenRef.current, { method: 'PUT', body: JSON.stringify(payload) });
      populateConfig(data);
      await Promise.all([refreshEhbotStatus(), refreshEhbotJobs()]);
      setStatus('EH Bot 配置已保存', 'ok');
    } catch (err) {
      setStatus(`EH Bot 配置保存失败：${err.message}`, 'err');
    } finally {
      setSaving(false);
    }
  };

  const handleCreateJob = async () => {
    setCreating(true);
    try {
      const v = createForm.getFieldsValue();
      const input = (v.input || '').trim();
      if (!input) { setStatus('请先填写漫画链接或 gid/token', 'warn'); return; }
      const data = await fetchJSON('/api/v1/admin/ehbot/jobs/create', tokenRef.current, {
        method: 'POST', body: JSON.stringify({ input, target_id: (v.target_id || '').trim() }),
      });
      createForm.resetFields();
      setStatus(`EH Bot 远程下载任务已创建：${data.job_id || '-'}${data.title ? ` | ${data.title}` : ''}`, 'ok');
      await Promise.all([refreshJobHistory(), refreshEhbotJobs(), refreshEhbotStatus()]);
    } catch (err) {
      setStatus(`EH Bot 远程建单失败：${err.message}`, 'err');
    } finally {
      setCreating(false);
    }
  };

  const handleRunOnce = async () => {
    setPulling(true);
    try {
      const data = await fetchJSON('/api/v1/admin/ehbot/pull/run-once', tokenRef.current, { method: 'POST', body: '{}' });
      setStatus(`EH Bot 拉取任务已入队：${data.job_id || '-'}`, 'ok');
      await Promise.all([refreshEhbotStatus(), refreshEhbotJobs()]);
    } catch (err) {
      setStatus(`EH Bot 拉取失败：${err.message}`, 'err');
    } finally {
      setPulling(false);
    }
  };

  // Filter & aggregate jobs
  const filteredJobs = useMemo(() => {
    const q = normalizeQuery(jobsSearch);
    return (ehbotJobs || []).filter(job => {
      if (jobsStatus && job.status !== jobsStatus) return false;
      return matchesQuery([job.job_id, job.remote_job_id, job.remote_title, job.imported_path, job.library_id, job.remote_target_id, job.error, job.trigger], q);
    });
  }, [ehbotJobs, jobsSearch, jobsStatus]);

  const displayJobs = useMemo(() => jobsAggregate ? aggregateEHBotItems(filteredJobs) : filteredJobs, [filteredJobs, jobsAggregate]);

  const jobsSummary = formatTableSummary({ total: (ehbotJobs || []).length, filtered: filteredJobs.length, displayed: displayJobs.length, aggregated: jobsAggregate });

  const jobColumns = [
    {
      title: 'Local Job', dataIndex: 'job_id', key: 'job_id', width: 180,
      render: (v, r) => (<div><Text code>{v}</Text><br/><Text type="secondary" style={{ fontSize: 12 }}>{r.trigger || '-'}</Text><GroupBadge record={r} /></div>),
    },
    { title: 'Status', dataIndex: 'status', key: 'status', width: 100, render: (v) => <StatusTag value={v} /> },
    {
      title: 'Remote Job', dataIndex: 'remote_job_id', key: 'remote', width: 200,
      render: (v, r) => (<div><Text code>{v || '-'}</Text><br/><Text type="secondary" style={{ fontSize: 12 }}>{r.remote_title || ''}</Text></div>),
    },
    {
      title: 'Target', dataIndex: 'library_id', key: 'target', width: 160,
      render: (v, r) => (<div><Text code>{v || '-'}</Text><br/><Text type="secondary" className="mono" style={{ fontSize: 12 }}>{r.remote_target_id || ''}</Text></div>),
    },
    { title: 'Progress', dataIndex: 'listed', key: 'progress', render: (_, r) => <Text className="mono">{formatEHBotProgress(r)}</Text> },
    { title: 'Imported Path', dataIndex: 'imported_path', key: 'path', render: (v) => <Text className="mono">{v || '-'}</Text> },
    {
      title: 'Error', dataIndex: 'error', key: 'error', width: 200,
      render: (v, r) => v ? <Text type="danger" className="mono">{v}</Text> : '-',
    },
  ];

  // EH Bot status summary
  const st = ehbotStatus || {};
  const modeTag = !st.configured
    ? <Pill text="配置错误" kind="err" />
    : st.running ? <Pill text="运行中" kind="warn" /> : st.enabled ? <Pill text="自动轮询已启用" kind="ok" /> : <Pill text="仅手动模式" kind="warn" />;

  const summaryParts = [
    `base_url=${st.base_url || '-'}`, `consumer_id=${st.consumer_id || '-'}`,
    `target_library=${st.target_library_id || '-'}`, `library_kind=${st.target_library_kind || '-'}`,
    `poll=${st.poll_interval_seconds || 0}s`, `lease=${st.lease_seconds || 0}s`,
    `download_timeout=${st.download_timeout_seconds || 0}s`, `max_jobs=${st.max_jobs_per_poll || 0}`,
    `auto_rescan=${st.auto_rescan ? 'true' : 'false'}`, `queue=${st.queue_depth || 0}`,
  ];
  if (st.config_error) summaryParts.push(`config_error=${st.config_error}`);
  if (st.last_imported_path) summaryParts.push(`last_imported=${st.last_imported_path}`);

  return (
    <Card title={
      <Flex justify="space-between" align="center" wrap="wrap" gap={8}>
        <div>
          <Title level={5} style={{ margin: 0 }}>EH Bot Pull / Import</Title>
          <Text type="secondary">Manage bot polling, claim, artifact download, import, and auto-rescan.</Text>
        </div>
        <Space>
          <Button type="primary" onClick={handleRunOnce} loading={pulling} disabled={!st.configured}>Run Once</Button>
          <Button onClick={() => Promise.all([refreshEhbotStatus(), refreshEhbotJobs()])}>Refresh EH Bot</Button>
        </Space>
      </Flex>
    }>
      {/* Config Section */}
      <Flex justify="space-between" align="center" style={{ marginBottom: 12 }}>
        <Text strong>EH Bot Config</Text>
        <Space>
          <Button onClick={handleLoadConfig}>Reload Config</Button>
          <Button type="primary" onClick={handleSaveConfig} loading={saving} disabled={!configMeta.writable}>Save Config</Button>
        </Space>
      </Flex>

      <Form form={configForm} layout="vertical" size="small">
        <Row gutter={16}>
          <Col span={24}>
            <Form.Item name="enabled" valuePropName="checked" style={{ marginBottom: 8 }}>
              <Checkbox>Enable automatic EH Bot polling</Checkbox>
            </Form.Item>
          </Col>
          <Col xs={24}>
            <Form.Item name="base_url" label="Base URL"><Input placeholder="https://ehbot.example.com" /></Form.Item>
          </Col>
          <Col xs={12} md={6}><Form.Item name="consumer_id" label="Consumer ID"><Input placeholder="home-server" /></Form.Item></Col>
          <Col xs={12} md={6}><Form.Item name="target_id" label="Target ID"><Input placeholder="home-server" /></Form.Item></Col>
          <Col xs={12} md={6}>
            <Form.Item name="target_library_id" label="Target Library">
              <Select placeholder="Select target library" allowClear>
                {(configMeta.libraries || []).map(lib => (
                  <Select.Option key={lib.id} value={lib.id}>{lib.name || lib.id} ({lib.kind || '-'})</Select.Option>
                ))}
              </Select>
            </Form.Item>
          </Col>
          <Col xs={12} md={6}><Form.Item name="target_subdir" label="Target Subdir"><Input placeholder="EH Inbox" /></Form.Item></Col>
          <Col xs={12} md={6}><Form.Item name="poll_interval_seconds" label="Poll Interval (s)"><InputNumber min={1} style={{ width: '100%' }} /></Form.Item></Col>
          <Col xs={12} md={6}><Form.Item name="lease_seconds" label="Lease Seconds"><InputNumber min={1} style={{ width: '100%' }} /></Form.Item></Col>
          <Col xs={12} md={6}><Form.Item name="download_timeout_seconds" label="Download Timeout (s)"><InputNumber min={1} style={{ width: '100%' }} /></Form.Item></Col>
          <Col xs={12} md={6}><Form.Item name="max_jobs_per_poll" label="Max Jobs Per Poll"><InputNumber min={1} style={{ width: '100%' }} /></Form.Item></Col>
          <Col xs={12} md={6}>
            <Form.Item name="auto_rescan" valuePropName="checked" style={{ marginTop: 28 }}>
              <Checkbox>Auto rescan after import</Checkbox>
            </Form.Item>
          </Col>
          <Col xs={12} md={6}>
            <Form.Item name="clear_pull_token" valuePropName="checked" style={{ marginTop: 28 }}>
              <Checkbox onChange={(e) => { setClearToken(e.target.checked); if (e.target.checked) configForm.setFieldValue('pull_token', ''); }}>
                Clear stored pull token
              </Checkbox>
            </Form.Item>
          </Col>
          <Col span={24}>
            <Form.Item name="pull_token" label="Pull Token">
              <Password disabled={clearToken} placeholder="Leave blank to keep current token" />
            </Form.Item>
          </Col>
        </Row>
      </Form>

      <Space style={{ marginBottom: 16 }}>
        <Text type="secondary">Config file: <Text code>{configMeta.config_path || '-'}</Text></Text>
        {configMeta.writable ? <Pill text="可写" kind="ok" /> : <Pill text="只读" kind="warn" />}
        {configMeta.pull_token_configured ? <Pill text="已配置 Token" kind="ok" /> : <Pill text="Token 为空" kind="warn" />}
      </Space>
      <br />
      <Text type="secondary" style={{ fontSize: 12 }}>{configMeta.rewrite_warning || 'Pull Token 留空表示保持现状；勾选清空则移除已有 token。'}</Text>

      <Divider />

      {/* Create Job Section */}
      <Flex justify="space-between" align="center" style={{ marginBottom: 12 }}>
        <Text strong>创建远程下载任务</Text>
        <Button type="primary" onClick={handleCreateJob} loading={creating}>创建下载任务</Button>
      </Flex>
      <Form form={createForm} layout="vertical" size="small">
        <Row gutter={16}>
          <Col xs={24} md={16}>
            <Form.Item name="input" label="漫画链接 / gid/token"><Input placeholder="https://e-hentai.org/g/... 或 12345/abcdef" /></Form.Item>
          </Col>
          <Col xs={24} md={8}>
            <Form.Item name="target_id" label="Target ID"><Input placeholder="留空则使用当前配置" /></Form.Item>
          </Col>
        </Row>
      </Form>
      <Text type="secondary" style={{ fontSize: 12 }}>通过 Home Server 代理请求 ehbot_server 创建远程下载任务，无需依赖 Telegram。</Text>

      <Divider />

      {/* Summary Cards */}
      <Row gutter={16} style={{ marginBottom: 16 }}>
        <Col xs={24} md={8}><Card size="small"><Statistic title="Mode" valueRender={() => modeTag} /></Card></Col>
        <Col xs={24} md={8}>
          <Card size="small"><Statistic title="Target" valueRender={() => (
            <div><Text className="mono">{st.target_library_id || '-'}</Text><br/>
            <Text type="secondary" className="mono" style={{ fontSize: 12 }}>{st.target_subdir || '/'}{st.target_id ? ` | target=${st.target_id}` : ''}</Text></div>
          )} /></Card>
        </Col>
        <Col xs={24} md={8}>
          <Card size="small"><Statistic title="Last Activity" valueRender={() => (
            <div><Text>{formatDateTime(st.last_poll_at)}</Text><br/><Text type="secondary" style={{ fontSize: 12 }}>{formatDateTime(st.last_success_at)}</Text></div>
          )} /></Card>
        </Col>
      </Row>
      <Text type="secondary" className="mono" style={{ fontSize: 12, display: 'block', marginBottom: 16 }}>{summaryParts.join(' | ')}</Text>

      {/* Jobs Table */}
      <Flex gap={12} wrap="wrap" align="center" style={{ marginBottom: 12 }}>
        <Input placeholder="job_id / 标题 / 路径" value={jobsSearch} onChange={(e) => setJobsSearch(e.target.value)} style={{ width: 220 }} size="small" allowClear />
        <Select value={jobsStatus} onChange={setJobsStatus} style={{ width: 140 }} size="small" allowClear placeholder="全部状态">
          <Select.Option value="queued">queued</Select.Option>
          <Select.Option value="running">running</Select.Option>
          <Select.Option value="done">done</Select.Option>
          <Select.Option value="failed">failed</Select.Option>
          <Select.Option value="accepted">accepted</Select.Option>
        </Select>
        <Checkbox checked={jobsAggregate} onChange={(e) => setJobsAggregate(e.target.checked)}>聚合同状态相邻记录</Checkbox>
        <Text type="secondary" style={{ fontSize: 12 }}>{jobsSummary}</Text>
      </Flex>
      <Table
        columns={jobColumns}
        dataSource={displayJobs}
        rowKey={(r, i) => r.job_id || `ej-${i}`}
        size="small"
        pagination={false}
        scroll={{ x: 900, y: 500 }}
        locale={{ emptyText: '暂无 EH Bot 任务' }}
      />
    </Card>
  );
};

/* ═══════════════════════════════════════════════════════════
   Metadata Panel
   ═══════════════════════════════════════════════════════════ */
const MetadataPanel = () => {
  const {
    tokenRef, setStatus, sources, sourceDir, metaJobs, metaJobsLoading,
    refreshMetaJobs, refreshSources, refreshRecords, refreshJobHistory,
    recordItems, recordTotal, recordPage, recordPageSize, recordsLoading,
    polling, setPolling, openSidecar, selectedRecords, setSelectedRecords,
  } = React.useContext(AppCtx);

  const [enrichForm] = Form.useForm();
  const [mgmtForm] = Form.useForm();
  const [jobsSearch, setJobsSearch] = useState('');
  const [jobsStatus, setJobsStatus] = useState('');
  const [jobsAggregate, setJobsAggregate] = useState(true);
  const [recLibrary, setRecLibrary] = useState('');
  const [recState, setRecState] = useState('');
  const [recSearch, setRecSearch] = useState('');
  const [recPageSize, setRecPageSize] = useState(50);
  const [batchAction, setBatchAction] = useState('');
  const [enriching, setEnriching] = useState(false);
  const [cleanupResult, setCleanupResult] = useState('');
  const browseQueryRef = useRef('');
  const browseSourceRef = useRef('');
  const [browseSourceId, setBrowseSourceId] = useState('');
  const [browseQuery, setBrowseQuery] = useState('');
  const [browsePageSize, setBrowsePageSize] = useState(30);
  const [browsePage, setBrowsePage] = useState(1);
  const [browseData, setBrowseData] = useState({ items: [], columns: [], total: 0, source: null, table: '' });
  const [browseLoading, setBrowseLoading] = useState(false);

  // Enrich
  const handleEnrich = async () => {
    setEnriching(true);
    try {
      const v = enrichForm.getFieldsValue();
      const payload = {
        library_id: (v.library_id || '').trim(),
        state: v.state || 'empty',
        limit: Number(v.limit || 200),
        min_score: Number(v.min_score || 0.72),
        source_id: v.source_id || '',
        workers: Number(v.workers || 3),
      };
      const data = await fetchJSON('/api/v1/admin/metadata/enrich', tokenRef.current, { method: 'POST', body: JSON.stringify(payload) });
      setStatus(`已提交补全任务 ${data.job_id || '-'}`, 'ok');
      await refreshMetaJobs();
    } catch (err) {
      setStatus(err.message, 'err');
    } finally {
      setEnriching(false);
    }
  };

  // Cleanup
  const handleCleanup = async (dryRun) => {
    if (!dryRun) {
      Modal.confirm({
        title: '确认清理', content: '确认物理删除数据库中的 missing 记录吗？建议先执行 Dry Run。',
        okText: '确认删除', okType: 'danger', cancelText: '取消',
        onOk: () => doCleanup(false),
      });
      return;
    }
    await doCleanup(true);
  };

  const doCleanup = async (dryRun) => {
    try {
      const v = mgmtForm.getFieldsValue();
      const payload = { library_id: (v.library_id || '').trim(), older_than_days: Number(v.older_than_days || 0), dry_run: dryRun };
      const data = await fetchJSON('/api/v1/admin/metadata/cleanup', tokenRef.current, { method: 'POST', body: JSON.stringify(payload) });
      const scope = payload.library_id || '全部书库';
      const prefix = dryRun ? 'Dry Run 结果' : '清理结果';
      setCleanupResult(`${prefix} 范围 [${scope}] / 保留 ${payload.older_than_days} 天 / 匹配 ${data.matched || 0} 条 / 删除 ${data.deleted || 0} 条`);
      if (dryRun) {
        setStatus(`测试清理完成：共匹配 ${data.matched || 0} 条 missing 数据`, 'ok');
      } else {
        setStatus(`清理完成：成功删除 ${data.deleted || 0}/${data.matched || 0} 条记录`, 'ok');
        setSelectedRecords({});
      }
      refreshRecords();
    } catch (err) {
      setStatus(err.message, 'err');
    }
  };

  // Rescan
  const handleRescan = async (libraryId) => {
    try {
      if (libraryId === undefined) {
        const v = mgmtForm.getFieldsValue();
        libraryId = (v.library_id || '').trim();
      }
      if (libraryId === '' && libraryId !== undefined) {
        // rescan all - needs confirm
      }
      const data = await fetchJSON('/api/v1/admin/rescan', tokenRef.current, { method: 'POST', body: JSON.stringify({ library_id: libraryId || '' }) });
      setStatus(`已提交 Rescan 任务 ${data.job_id}`, 'ok');
      await Promise.all([refreshMetaJobs(), refreshJobHistory()]);
    } catch (err) {
      setStatus(err.message, 'err');
    }
  };

  const handleRescanSelected = async () => {
    const v = mgmtForm.getFieldsValue();
    const lib = (v.library_id || '').trim();
    if (!lib) { setStatus('请先在"书库"输入框中填写书库 ID', 'err'); return; }
    await handleRescan(lib);
  };

  const handleRescanAll = () => {
    Modal.confirm({
      title: '确认全库扫描', content: '确认对系统全部书库触发扫描任务吗？该操作可能耗时较长。',
      okText: '确认', cancelText: '取消',
      onOk: () => handleRescan(''),
    });
  };

  // Records
  const handleQueryRecords = (page = 1) => {
    refreshRecords({ page, limit: recPageSize, library_id: recLibrary, state: recState, search: recSearch });
  };

  // Record actions
  const handleRecordAction = async (action, locator) => {
    try {
      const ev = enrichForm.getFieldsValue();
      const payload = {
        action, locator,
        source_id: ev.source_id || '',
        min_score: Number(ev.min_score || 0.72),
        workers: Number(ev.workers || 3),
      };
      const data = await fetchJSON('/api/v1/admin/metadata/records/actions', tokenRef.current, { method: 'POST', body: JSON.stringify(payload) });
      if (Array.isArray(data.jobs) && data.jobs.length > 0) {
        setStatus(`单条记录 [${actionLabel(action)}] 已拆分为 ${data.jobs.length} 个任务队列`, 'ok');
        await refreshMetaJobs();
      } else if (data.job?.job_id) {
        setStatus(`补全任务已投递：${data.job.job_id}`, 'ok');
        await refreshMetaJobs();
      } else {
        setStatus(`记录 [${actionLabel(action)}] 操作执行成功`, 'ok');
      }
      refreshRecords();
    } catch (err) {
      setStatus(`操作失败：${err.message}`, 'err');
    }
  };

  const handleBatchAction = async () => {
    if (!batchAction) { setStatus('请先选择批量动作类型', 'warn'); return; }
    const locators = Object.values(selectedRecords);
    if (locators.length === 0) { setStatus('当前未勾选任何记录', 'warn'); return; }
    try {
      const ev = enrichForm.getFieldsValue();
      const payload = {
        action: batchAction, locators,
        source_id: ev.source_id || '',
        min_score: Number(ev.min_score || 0.72),
        workers: Number(ev.workers || 3),
      };
      const data = await fetchJSON('/api/v1/admin/metadata/records/actions', tokenRef.current, { method: 'POST', body: JSON.stringify(payload) });
      if (Array.isArray(data.jobs) && data.jobs.length > 0) {
        setStatus(`批量任务 [${actionLabel(batchAction)}] 成功：拆分 ${data.jobs.length} 个队列`, 'ok');
        await refreshMetaJobs();
      } else {
        setStatus(`批量操作完成：处理 ${data.processed || locators.length} 条记录`, 'ok');
      }
      setSelectedRecords({});
      refreshRecords();
    } catch (err) {
      setStatus(`批量操作失败：${err.message}`, 'err');
    }
  };

  // Browse
  const handleBrowse = async (page = 1) => {
    setBrowseLoading(true);
    try {
      const srcId = browseSourceId;
      if (!srcId) { setStatus('查询失败：未选择或无可用数据源', 'warn'); return; }
      const params = new URLSearchParams({ q: browseQuery.trim(), page: String(page), limit: String(browsePageSize) });
      const data = await fetchJSON(`/api/v1/admin/metadata/sources/${encodeURIComponent(srcId)}/records?${params}`, tokenRef.current);
      const browse = data.browse || {};
      setBrowseData({
        items: (browse.items || []).map((item, i) => ({ ...item, _key: `b-${i}` })),
        columns: browse.columns || [],
        total: Number(browse.total || 0),
        source: data.source,
        table: browse.table || '',
      });
      setBrowsePage(page);
    } catch (err) {
      setStatus(`数据查询异常：${err.message}`, 'err');
    } finally {
      setBrowseLoading(false);
    }
  };

  const pickSource = (id) => {
    setBrowseSourceId(id);
    setTimeout(() => handleBrowse(1), 0);
  };

  // Filter metadata jobs
  const filteredMetaJobs = useMemo(() => {
    const q = normalizeQuery(jobsSearch);
    return (metaJobs || []).filter(job => {
      if (jobsStatus && job.status !== jobsStatus) return false;
      return matchesQuery([job.job_id, job.kind, job.library_id, job.path, job.error, formatJobSources(job)], q);
    });
  }, [metaJobs, jobsSearch, jobsStatus]);

  const displayMetaJobs = useMemo(() => jobsAggregate ? aggregateJobsItems(filteredMetaJobs) : filteredMetaJobs, [filteredMetaJobs, jobsAggregate]);

  const metaJobsCols = [
    { title: '任务 ID', dataIndex: 'job_id', key: 'jid', width: 160, render: (v, r) => (<div><Text code>{v}</Text><GroupBadge record={r} /></div>) },
    { title: '类型', dataIndex: 'kind', key: 'kind', width: 100, render: (v) => <Tag>{v || '-'}</Tag> },
    { title: '状态', dataIndex: 'status', key: 'st', width: 90, render: (v) => <StatusTag value={v} /> },
    { title: '书库', dataIndex: 'library_id', key: 'lib', width: 120, render: (v) => <Text className="mono">{v || '-'}</Text> },
    { title: '来源', dataIndex: 'source_id', key: 'src', width: 120, render: (_, r) => <Text type="secondary">{formatJobSources(r)}</Text> },
    { title: '进度', dataIndex: 'processed', key: 'prog', render: (_, r) => <Text className="mono">{formatJobProgress(r)}</Text> },
    { title: '错误日志', dataIndex: 'error', key: 'err', width: 200, render: (v) => v ? <Text type="danger" className="mono">{v}</Text> : '-' },
  ];

  // Record columns
  const selectedKeys = Object.keys(selectedRecords);
  const recordCols = [
    { title: '状态', dataIndex: 'state', key: 'st', width: 90, render: (v) => <StatusTag value={v} /> },
    { title: '标题 / TAG', key: 'title', render: (_, r) => <TagsCell item={r} setStatus={setStatus} /> },
    {
      title: '相对路径 / 绝对路径', key: 'path', width: 260,
      render: (_, r) => (<div><Text className="mono" strong>{r.root_ref || ''}</Text><br/><Text type="secondary" className="mono" style={{ fontSize: 12 }}>{r.folder_path || ''}</Text></div>),
    },
    {
      title: '来源信息', key: 'source', width: 150,
      render: (_, r) => (<div><Text>{r.source || ''}</Text><br/><Text type="secondary" className="mono" style={{ fontSize: 12 }}>{r.source_id || ''}</Text></div>),
    },
    { title: '置信度', dataIndex: 'confidence', key: 'conf', width: 80, render: (v) => <Text className="mono">{v == null ? '-' : v}</Text> },
    {
      title: '操作', key: 'actions', width: 280, fixed: 'right',
      render: (_, r) => (
        <Space size={4}>
          <Button size="small" onClick={() => openSidecar(r)}>配置</Button>
          <Button size="small" onClick={() => handleRecordAction(r.manual_locked ? 'unlock' : 'lock', r.locator)}>{r.manual_locked ? '解锁' : '锁定'}</Button>
          <Button size="small" onClick={() => handleRecordAction('reset', r.locator)}>重置</Button>
          <Button size="small" type="primary" ghost onClick={() => handleRecordAction('enrich', r.locator)}>补全</Button>
        </Space>
      ),
    },
  ];

  // Sources columns
  const sourceCols = [
    {
      title: '名称 / 路径', key: 'name',
      render: (_, r) => (<div><Text strong>{r.name}</Text><br/><Text type="secondary" className="mono" style={{ fontSize: 12 }}>{r.relative_path || ''}</Text></div>),
    },
    { title: '目标', dataIndex: 'chosen_table', key: 'tbl', render: (v) => <Text className="mono">{v || ''}</Text> },
    { title: '行数', dataIndex: 'row_count', key: 'rows', width: 80, render: (v) => <Text className="mono">{v ?? '-'}</Text> },
    { title: '状态', key: 'st', width: 80, render: (_, r) => r.error ? <Pill text={r.error} kind="err" /> : <Pill text="就绪" kind="ok" /> },
    { title: '操作', key: 'act', width: 80, render: (_, r) => <Button size="small" type="link" disabled={!!r.error} onClick={() => pickSource(r.id)}>查看</Button> },
  ];

  // Browse columns (dynamic)
  const browseCols = useMemo(() => browseData.columns.map(col => ({
    title: col, dataIndex: col, key: col, ellipsis: true,
    render: (v) => <Text className="mono">{v ?? ''}</Text>,
  })), [browseData.columns]);

  const availableSources = (sources || []).filter(s => !s.error);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
      {/* Enrich + Management */}
      <Row gutter={[24, 24]}>
        <Col xs={24} lg={12}>
          <Card title="批量补全任务（Batch Enrich）" size="small">
            <Form form={enrichForm} layout="vertical" size="small" initialValues={{ state: 'empty', limit: 200, min_score: 0.72, workers: 3 }}>
              <Row gutter={12}>
                <Col xs={24} md={8}><Form.Item name="library_id" label="书库（Library）"><Input placeholder="例如 local-main" /></Form.Item></Col>
                <Col xs={24} md={8}>
                  <Form.Item name="state" label="状态（State）">
                    <Select>
                      <Select.Option value="empty">empty</Select.Option>
                      <Select.Option value="ready">ready</Select.Option>
                      <Select.Option value="stale">stale</Select.Option>
                      <Select.Option value="error">error</Select.Option>
                      <Select.Option value="missing">missing</Select.Option>
                    </Select>
                  </Form.Item>
                </Col>
                <Col xs={24} md={8}>
                  <Form.Item name="source_id" label="来源（Source）">
                    <Select placeholder="自动选择可用数据源" allowClear>
                      {availableSources.map(s => <Select.Option key={s.id} value={s.id}>{s.name}</Select.Option>)}
                    </Select>
                  </Form.Item>
                </Col>
                <Col xs={8}><Form.Item name="limit" label="上限"><InputNumber min={1} max={2000} style={{ width: '100%' }} /></Form.Item></Col>
                <Col xs={8}><Form.Item name="min_score" label="最低分"><InputNumber min={0} max={1} step={0.01} style={{ width: '100%' }} /></Form.Item></Col>
                <Col xs={8}><Form.Item name="workers" label="并发"><InputNumber min={1} max={4} style={{ width: '100%' }} /></Form.Item></Col>
              </Row>
            </Form>
            <Space style={{ marginTop: 8 }}>
              <Button type="primary" onClick={handleEnrich} loading={enriching}>开始补全任务</Button>
              <Button onClick={refreshSources}>刷新数据源</Button>
              <Button onClick={refreshMetaJobs}>刷新任务状态</Button>
            </Space>
          </Card>
        </Col>
        <Col xs={24} lg={12}>
          <Card title="元数据管理" size="small">
            <Form form={mgmtForm} layout="vertical" size="small" initialValues={{ older_than_days: 0 }}>
              <Row gutter={12}>
                <Col xs={12}><Form.Item name="library_id" label="书库（Library）"><Input placeholder="例如 local-main" /></Form.Item></Col>
                <Col xs={12}><Form.Item name="older_than_days" label="missing 保留天数"><InputNumber min={0} style={{ width: '100%' }} /></Form.Item></Col>
              </Row>
            </Form>
            <Space wrap style={{ marginTop: 8 }}>
              <Button onClick={handleRescanSelected}>重扫当前书库</Button>
              <Button onClick={handleRescanAll}>重扫全部</Button>
              <Button onClick={() => handleCleanup(true)}>测试清理（Dry Run）</Button>
              <Button danger onClick={() => handleCleanup(false)}>清理失效记录</Button>
            </Space>
            {cleanupResult && <Text type="secondary" style={{ display: 'block', marginTop: 8, fontSize: 12 }}>{cleanupResult}</Text>}
            <Text type="secondary" style={{ display: 'block', marginTop: 8, fontSize: 12 }}>清理仅处理 missing 记录，建议先试运行（Dry Run）；重扫和清理将使用上方指定的书库。</Text>
          </Card>
        </Col>
      </Row>

      {/* Background Jobs */}
      <Card title={
        <Flex justify="space-between" align="center">
          <span>后台任务（Jobs）</span>
          <Button size="small" onClick={() => setPolling(p => !p)}>{polling ? '暂停自动刷新' : '恢复自动刷新'}</Button>
        </Flex>
      } size="small">
        <Flex gap={12} wrap="wrap" align="center" style={{ marginBottom: 12 }}>
          <Input placeholder="job_id / 类型 / 书库 / 路径" value={jobsSearch} onChange={(e) => setJobsSearch(e.target.value)} style={{ width: 220 }} size="small" allowClear />
          <Select value={jobsStatus || undefined} onChange={(v) => setJobsStatus(v || '')} style={{ width: 140 }} size="small" allowClear placeholder="全部状态">
            <Select.Option value="queued">queued</Select.Option>
            <Select.Option value="running">running</Select.Option>
            <Select.Option value="done">done</Select.Option>
            <Select.Option value="failed">failed</Select.Option>
            <Select.Option value="ready">ready</Select.Option>
            <Select.Option value="accepted">accepted</Select.Option>
          </Select>
          <Checkbox checked={jobsAggregate} onChange={(e) => setJobsAggregate(e.target.checked)}>聚合同类相邻记录</Checkbox>
          <Text type="secondary" style={{ fontSize: 12 }}>
            {formatTableSummary({ total: (metaJobs || []).length, filtered: filteredMetaJobs.length, displayed: displayMetaJobs.length, aggregated: jobsAggregate })}
          </Text>
        </Flex>
        <Table columns={metaJobsCols} dataSource={displayMetaJobs} rowKey={(r, i) => r.job_id || `mj-${i}`} size="small"
          pagination={false} scroll={{ x: 800, y: 400 }} loading={metaJobsLoading} locale={{ emptyText: '当前没有运行中的任务' }} />
      </Card>

      {/* Local Records */}
      <Card title="本地元数据记录（Local Records）" size="small"
        extra={<Button type="primary" size="small" onClick={() => handleQueryRecords(1)}>查询记录</Button>}>
        <Flex gap={12} wrap="wrap" align="center" style={{ marginBottom: 12 }}>
          <Input placeholder="书库（留空表示全部）" value={recLibrary} onChange={(e) => setRecLibrary(e.target.value)} style={{ width: 160 }} size="small" />
          <Select value={recState || undefined} onChange={(v) => setRecState(v || '')} style={{ width: 130 }} size="small" allowClear placeholder="全部状态">
            <Select.Option value="empty">empty</Select.Option>
            <Select.Option value="ready">ready</Select.Option>
            <Select.Option value="stale">stale</Select.Option>
            <Select.Option value="error">error</Select.Option>
            <Select.Option value="missing">missing</Select.Option>
            <Select.Option value="locked">locked</Select.Option>
          </Select>
          <Input placeholder="标题 / 路径 / 来源模糊搜索" value={recSearch} onChange={(e) => setRecSearch(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter') handleQueryRecords(1); }} style={{ width: 220 }} size="small" allowClear />
          <Select value={recPageSize} onChange={(v) => { setRecPageSize(v); refreshRecords({ limit: v, page: 1 }); }} style={{ width: 90 }} size="small">
            <Select.Option value={30}>30/页</Select.Option>
            <Select.Option value={50}>50/页</Select.Option>
            <Select.Option value={100}>100/页</Select.Option>
            <Select.Option value={200}>200/页</Select.Option>
          </Select>
        </Flex>
        <Flex gap={12} wrap="wrap" align="center" style={{ marginBottom: 12 }}>
          <Text type="secondary">{selectedKeys.length === 0 ? '未选择记录' : `已选择 ${selectedKeys.length} 条记录`}</Text>
          <Select value={batchAction || undefined} onChange={(v) => setBatchAction(v || '')} style={{ width: 160 }} size="small" allowClear placeholder="请选择批量动作...">
            <Select.Option value="lock">锁定（Lock）</Select.Option>
            <Select.Option value="unlock">解锁（Unlock）</Select.Option>
            <Select.Option value="reset">重置（Reset）</Select.Option>
            <Select.Option value="enrich">重新补全（Enrich）</Select.Option>
          </Select>
          <Button size="small" type="primary" disabled={selectedKeys.length === 0 || !batchAction} onClick={handleBatchAction}>应用到已选</Button>
          <Button size="small" disabled={selectedKeys.length === 0} onClick={() => setSelectedRecords({})}>清空选择</Button>
        </Flex>
        <Table
          columns={recordCols}
          dataSource={recordItems}
          rowKey={(r) => locatorKey(r.locator)}
          size="small"
          loading={recordsLoading}
          scroll={{ x: 1100 }}
          locale={{ emptyText: '暂无符合条件的记录' }}
          rowSelection={{
            selectedRowKeys: selectedKeys,
            onSelect: (record, selected) => {
              const key = locatorKey(record.locator);
              setSelectedRecords(prev => {
                const next = { ...prev };
                if (selected) next[key] = record.locator; else delete next[key];
                return next;
              });
            },
            onSelectAll: (selected, _, changeRows) => {
              setSelectedRecords(prev => {
                const next = { ...prev };
                changeRows.forEach(r => { const k = locatorKey(r.locator); if (selected) next[k] = r.locator; else delete next[k]; });
                return next;
              });
            },
          }}
          pagination={{
            current: recordPage, pageSize: recordPageSize, total: recordTotal,
            onChange: (p, ps) => refreshRecords({ page: p, limit: ps }),
            showSizeChanger: false, showTotal: (t) => `共 ${t} 条`,
          }}
        />
      </Card>

      {/* Sources + Browse */}
      <Row gutter={[24, 24]}>
        <Col xs={24} lg={12}>
          <Card title="外部数据源（External Sources）" size="small">
            {sourceDir && <Text type="secondary" className="mono" style={{ fontSize: 12, display: 'block', marginBottom: 12 }}>数据源目录：{sourceDir}</Text>}
            <Table columns={sourceCols} dataSource={sources} rowKey="id" size="small" pagination={false}
              scroll={{ y: 300 }} locale={{ emptyText: '目录为空。请将外部 sqlite 数据库放到 data/externaldb 目录。' }} />
          </Card>
        </Col>
        <Col xs={24} lg={12}>
          <Card title="数据源浏览（Browse Data）" size="small">
            <Flex gap={12} wrap="wrap" align="center" style={{ marginBottom: 12 }}>
              <Select value={browseSourceId || undefined} onChange={(v) => setBrowseSourceId(v || '')} style={{ width: 180 }} size="small" placeholder="选择源库">
                {availableSources.map(s => <Select.Option key={s.id} value={s.id}>{s.name}</Select.Option>)}
              </Select>
              <Input placeholder="标题 / 作者模糊搜索" value={browseQuery} onChange={(e) => setBrowseQuery(e.target.value)}
                onKeyDown={(e) => { if (e.key === 'Enter') handleBrowse(1); }} style={{ width: 180 }} size="small" allowClear />
              <Select value={browsePageSize} onChange={(v) => setBrowsePageSize(v)} style={{ width: 80 }} size="small">
                <Select.Option value={30}>30</Select.Option>
                <Select.Option value={50}>50</Select.Option>
                <Select.Option value={100}>100</Select.Option>
                <Select.Option value={200}>200</Select.Option>
              </Select>
              <Button type="primary" size="small" onClick={() => handleBrowse(1)}>查询数据</Button>
            </Flex>
            {browseData.source && (
              <Text type="secondary" style={{ fontSize: 12, display: 'block', marginBottom: 8 }}>
                <Text strong>{browseData.source.name || '-'}</Text> / 数据表：<Text code>{browseData.table}</Text> / {formatTableSummary({ total: browseData.total, displayed: browseData.items.length })}
              </Text>
            )}
            <Table columns={browseCols} dataSource={browseData.items} rowKey="_key" size="small" loading={browseLoading}
              scroll={{ x: 600, y: 300 }} locale={{ emptyText: '暂无匹配查询结果' }}
              pagination={{
                current: browsePage, pageSize: browsePageSize, total: browseData.total,
                onChange: (p) => handleBrowse(p), showSizeChanger: false, size: 'small',
              }}
            />
          </Card>
        </Col>
      </Row>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   Job History Panel
   ═══════════════════════════════════════════════════════════ */
const JobHistoryPanel = () => {
  const { tokenRef, setStatus, historyItems, historyTotal, historyPage, historyPageSize, historyLoading, refreshJobHistory } = React.useContext(AppCtx);
  const [kind, setKind] = useState('');
  const [trigger, setTrigger] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [library, setLibrary] = useState('');
  const [aggregate, setAggregate] = useState(true);
  const [pageSize, setPageSize] = useState(100);

  const handleRefresh = (resetPage = false) => {
    refreshJobHistory({
      kind: kind.trim(), trigger, status: statusFilter, library_id: library.trim(),
      page: resetPage ? 1 : undefined, limit: pageSize,
    });
  };

  const rawItems = historyItems || [];
  const displayItems = useMemo(() => aggregate ? aggregateJobHistoryItems(rawItems) : rawItems, [rawItems, aggregate]);

  const cols = [
    {
      title: '任务 ID', dataIndex: 'job_id', key: 'jid', width: 160,
      render: (v, r) => {
        const count = Number(r._group_count || 1);
        return (<div>
          <Text code>{v}</Text>
          {count > 1 && <div><Tag color="warning">×{count}</Tag> <Text code style={{ fontSize: 11 }}>最早 {r._group_first_job_id || ''}</Text></div>}
        </div>);
      },
    },
    { title: '类型', dataIndex: 'kind', key: 'kind', width: 130, render: (v) => <Tag>{v || '-'}</Tag> },
    { title: '触发', dataIndex: 'trigger', key: 'trig', width: 100, render: (v) => <Tag color={v === 'manual' ? 'warning' : v ? 'success' : 'default'}>{v || '-'}</Tag> },
    { title: '状态', dataIndex: 'status', key: 'st', width: 90, render: (v) => <StatusTag value={v} /> },
    {
      title: '书库/目标', key: 'target', width: 180,
      render: (_, r) => {
        const target = [r.library_id, r.target_id, r.remote_job_id].filter(Boolean).join(' / ');
        return (<div><Text className="mono" strong>{target || '-'}</Text><br/><Text type="secondary" className="mono" style={{ fontSize: 12 }}>{r.path || ''}</Text></div>);
      },
    },
    {
      title: '时间', key: 'time', width: 180,
      render: (_, r) => {
        const count = Number(r._group_count || 1);
        return (<div>
          <Text className="mono">{formatDateTime(r.updated_at || r.requested_at)}</Text>
          {count > 1 && <br />}
          {count > 1 && <Text type="secondary" className="mono" style={{ fontSize: 11 }}>起始 {formatDateTime(r._group_first_updated_at || r.requested_at)}</Text>}
        </div>);
      },
    },
    {
      title: '摘要', dataIndex: 'summary', key: 'sum',
      render: (v, r) => {
        const count = Number(r._group_count || 1);
        return (<div>{v || '-'}{count > 1 && <Text type="secondary" style={{ fontSize: 12, display: 'block' }}>相邻 {count} 条相同类型且相同状态记录已折叠</Text>}</div>);
      },
    },
    {
      title: '错误', dataIndex: 'error', key: 'err', width: 200,
      render: (v, r) => {
        if (!v && !(r._group_error_count > 0)) return '-';
        return (<div>{v && <Text type="danger" className="mono">{v}</Text>}{r._group_error_count > 0 && <Text type="secondary" style={{ fontSize: 12, display: 'block' }}>聚合内含 {r._group_error_count} 条错误</Text>}</div>);
      },
    },
  ];

  return (
    <Card title={
      <Flex justify="space-between" align="center" wrap="wrap" gap={8}>
        <div>
          <Title level={5} style={{ margin: 0 }}>统一 Job 历史</Title>
          <Text type="secondary">汇总显示 metadata、EH Bot 拉取，以及手动触发的远程建单等后台任务记录。</Text>
        </div>
        <Button onClick={() => handleRefresh(true)}>刷新 Job 历史</Button>
      </Flex>
    }>
      <Flex gap={12} wrap="wrap" align="center" style={{ marginBottom: 12 }}>
        <Input placeholder="如 metadata.refresh / ehbot.pull" value={kind} onChange={(e) => setKind(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') handleRefresh(true); }} style={{ width: 200 }} size="small" />
        <Select value={trigger || undefined} onChange={(v) => { setTrigger(v || ''); }} style={{ width: 130 }} size="small" allowClear placeholder="全部触发方式">
          <Select.Option value="manual">manual</Select.Option>
          <Select.Option value="auto">auto</Select.Option>
          <Select.Option value="rescan">rescan</Select.Option>
          <Select.Option value="refresh">refresh</Select.Option>
          <Select.Option value="enrich">enrich</Select.Option>
          <Select.Option value="record_action">record_action</Select.Option>
          <Select.Option value="startup">startup</Select.Option>
        </Select>
        <Select value={statusFilter || undefined} onChange={(v) => { setStatusFilter(v || ''); }} style={{ width: 120 }} size="small" allowClear placeholder="全部状态">
          <Select.Option value="queued">queued</Select.Option>
          <Select.Option value="running">running</Select.Option>
          <Select.Option value="done">done</Select.Option>
          <Select.Option value="failed">failed</Select.Option>
          <Select.Option value="ready">ready</Select.Option>
          <Select.Option value="accepted">accepted</Select.Option>
        </Select>
        <Input placeholder="如 local-main" value={library} onChange={(e) => setLibrary(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') handleRefresh(true); }} style={{ width: 140 }} size="small" />
        <Checkbox checked={aggregate} onChange={(e) => setAggregate(e.target.checked)}>聚合同类同状态相邻记录</Checkbox>
        <Select value={pageSize} onChange={(v) => { setPageSize(v); }} style={{ width: 90 }} size="small">
          <Select.Option value={30}>30/页</Select.Option>
          <Select.Option value={50}>50/页</Select.Option>
          <Select.Option value={100}>100/页</Select.Option>
          <Select.Option value={200}>200/页</Select.Option>
        </Select>
      </Flex>
      <Text type="secondary" style={{ fontSize: 12, display: 'block', marginBottom: 8 }}>
        {formatTableSummary({ total: historyTotal, displayed: displayItems.length, aggregated: aggregate })} / 本页原始 {rawItems.length} 条 / 每页 {historyPageSize} 条
      </Text>
      <Table columns={cols} dataSource={displayItems} rowKey={(r, i) => r.job_id || `jh-${i}`} size="small"
        loading={historyLoading} scroll={{ x: 1000, y: 500 }} locale={{ emptyText: '暂无 Job 历史记录' }}
        pagination={{
          current: historyPage, pageSize: historyPageSize, total: historyTotal,
          onChange: (p) => refreshJobHistory({ page: p, limit: pageSize }),
          showSizeChanger: false, showTotal: (t) => `共 ${t} 条`,
        }}
      />
    </Card>
  );
};

/* ═══════════════════════════════════════════════════════════
   Sidecar Modal
   ═══════════════════════════════════════════════════════════ */
const SidecarModal = () => {
  const { tokenRef, setStatus, sidecarVisible, sidecarLocator, sidecarItem, sidecarInfo, setSidecarInfo, closeSidecar, refreshRecords } = React.useContext(AppCtx);
  const [content, setContent] = useState('');
  const [autoRescan, setAutoRescan] = useState(true);
  const [summary, setSummary] = useState('等待操作');
  const [saving, setSaving] = useState(false);
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    if (sidecarInfo) {
      setContent(sidecarInfo.exists
        ? formatSidecarContent(sidecarInfo.content, buildSidecarTemplate(sidecarItem))
        : buildSidecarTemplate(sidecarItem));
      setSummary(sidecarInfo.exists ? '文件读取成功' : '本地暂无 Sidecar 文件，您可以直接编辑并保存以创建。');
    }
  }, [sidecarInfo, sidecarItem]);

  const loadSidecar = async () => {
    if (!sidecarLocator) return;
    try {
      setSummary('正在加载...');
      const params = new URLSearchParams(sidecarLocator);
      const data = await fetchJSON(`/api/v1/admin/metadata/sidecar?${params}`, tokenRef.current);
      setSidecarInfo(data);
    } catch (err) {
      setSummary(err.message);
      setStatus(`读取失败: ${err.message}`, 'err');
    }
  };

  const handleSave = async () => {
    setSaving(true);
    try {
      const trimmed = content.trim();
      JSON.parse(trimmed);
      await fetchJSON('/api/v1/admin/metadata/sidecar', tokenRef.current, { method: 'PUT', body: JSON.stringify({ locator: sidecarLocator, content: trimmed }) });
      await loadSidecar();
      setSummary('保存成功');
      if (autoRescan) {
        const data = await fetchJSON('/api/v1/admin/rescan', tokenRef.current, { method: 'POST', body: JSON.stringify({ library_id: sidecarLocator.library_id || '' }) });
        setStatus(`Sidecar 已保存，并已触发重扫任务：${data.job_id}`, 'ok');
      } else {
        setStatus('Sidecar 文件已成功保存到磁盘', 'ok');
      }
      refreshRecords();
    } catch (err) {
      setSummary(`JSON 格式错误或保存失败：${err.message}`);
      setStatus('文件保存失败，请检查格式', 'err');
    } finally {
      setSaving(false);
    }
  };

  const handleDelete = async () => {
    setDeleting(true);
    try {
      await fetchJSON('/api/v1/admin/metadata/sidecar', tokenRef.current, { method: 'DELETE', body: JSON.stringify({ locator: sidecarLocator }) });
      await loadSidecar();
      setSummary('文件已删除');
      if (autoRescan) {
        const data = await fetchJSON('/api/v1/admin/rescan', tokenRef.current, { method: 'POST', body: JSON.stringify({ library_id: sidecarLocator.library_id || '' }) });
        setStatus(`Sidecar 已移除，并已触发重扫任务：${data.job_id}`, 'ok');
      } else {
        setStatus('Sidecar 文件已被删除', 'ok');
      }
      refreshRecords();
    } catch (err) {
      setSummary(err.message);
      setStatus(`删除失败: ${err.message}`, 'err');
    } finally {
      setDeleting(false);
    }
  };

  const info = sidecarInfo || {};
  const loc = sidecarLocator || {};

  return (
    <Modal
      title="编辑 .venera.json（Sidecar）"
      open={sidecarVisible}
      onCancel={closeSidecar}
      width={980}
      footer={null}
      destroyOnClose
    >
      <Text type="secondary">书库 {loc.library_id || '-'} / 类型 {loc.root_type || '-'} / 路径 {loc.root_ref || '-'}</Text>

      <Row gutter={16} style={{ marginTop: 16, marginBottom: 16 }}>
        <Col xs={24} md={8}>
          <Card size="small"><Statistic title="文件路径" valueRender={() => <Text className="mono" style={{ fontSize: 12 }}>{info.display_path || info.sidecar_ref || '-'}</Text>} /></Card>
        </Col>
        <Col xs={24} md={8}>
          <Card size="small"><Statistic title="当前状态" valueRender={() => {
            if (!info.exists && !info.writable) return <Pill text="缺失 / 只读" kind="err" />;
            if (!info.exists && info.writable) return <Pill text="缺失 / 可写" kind="warn" />;
            if (info.exists && info.writable) return <Pill text="已存在 / 可写" kind="ok" />;
            return <Pill text="已存在 / 只读" kind="warn" />;
          }} /></Card>
        </Col>
        <Col xs={24} md={8}>
          <Card size="small"><Statistic title="存储后端" valueRender={() => <Text>{(info.backend_kind || '-') + (info.writable ? '' : '（受保护）')}</Text>} /></Card>
        </Col>
      </Row>

      <Space style={{ marginBottom: 12 }}>
        <Button onClick={loadSidecar}>重新读取</Button>
        <Button onClick={() => { setContent(buildSidecarTemplate(sidecarItem)); setSummary('已自动生成模板结构'); }}>应用模板</Button>
      </Space>

      <div style={{ marginBottom: 12 }}>
        <Checkbox checked={autoRescan} onChange={(e) => setAutoRescan(e.target.checked)}>保存或删除后，自动触发该书库的 Rescan 任务</Checkbox>
      </div>

      <TextArea
        value={content}
        onChange={(e) => setContent(e.target.value)}
        className="mono"
        rows={12}
        spellCheck={false}
        placeholder="在此处直接编辑 JSON 内容..."
        style={{ fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace' }}
      />

      <Flex justify="space-between" align="center" style={{ marginTop: 12 }}>
        <Space>
          <Button type="primary" onClick={handleSave} loading={saving} disabled={!info.writable}>保存 Sidecar 文件</Button>
          <Popconfirm title="危险操作" description="确认要彻底删除 Sidecar 配置文件吗？" onConfirm={handleDelete} okText="确认删除" okType="danger">
            <Button danger loading={deleting} disabled={!info.writable || !info.exists}>删除文件</Button>
          </Popconfirm>
        </Space>
        <Text type="secondary">{summary}</Text>
      </Flex>
    </Modal>
  );
};

/* ═══════════════════════════════════════════════════════════
   App Component
   ═══════════════════════════════════════════════════════════ */
const App = () => {
  // ─── UI State ───
  const [themeMode, setThemeMode] = useState(preferredTheme());
  const [activeTab, setActiveTab] = useState(loadPreferredTab());
  const [polling, setPolling] = useState(true);
  const [statusState, setStatusState] = useState({ text: '系统已就绪，等待操作', type: 'info' });
  const [token, setToken] = useState(localStorage.getItem('venera_admin_token') || '');

  // ─── EH Bot State ───
  const [ehbotStatus, setEhbotStatus] = useState(null);
  const [ehbotConfig, setEhbotConfig] = useState(null);
  const [ehbotJobs, setEhbotJobs] = useState([]);

  // ─── Metadata State ───
  const [metaJobs, setMetaJobs] = useState([]);
  const [metaJobsLoading, setMetaJobsLoading] = useState(false);
  const [sources, setSources] = useState([]);
  const [sourceDir, setSourceDir] = useState('');

  // ─── Records State ───
  const [recordItems, setRecordItems] = useState([]);
  const [recordTotal, setRecordTotal] = useState(0);
  const [recordPage, setRecordPage] = useState(1);
  const [recordPageSize, setRecordPageSize] = useState(50);
  const [recordsLoading, setRecordsLoading] = useState(false);
  const [selectedRecords, setSelectedRecords] = useState({});

  // ─── Job History State ───
  const [historyItems, setHistoryItems] = useState([]);
  const [historyTotal, setHistoryTotal] = useState(0);
  const [historyPage, setHistoryPage] = useState(1);
  const [historyPageSize, setHistoryPageSize] = useState(100);
  const [historyLoading, setHistoryLoading] = useState(false);

  // ─── Sidecar State ───
  const [sidecarVisible, setSidecarVisible] = useState(false);
  const [sidecarLocator, setSidecarLocator] = useState(null);
  const [sidecarItem, setSidecarItem] = useState(null);
  const [sidecarInfo, setSidecarInfo] = useState(null);

  // ─── Refs ───
  const tokenRef = useRef(token);
  const pollingRef = useRef(polling);
  const recordQueryRef = useRef({ page: 1, limit: 50, library_id: '', state: '', search: '' });
  const historyQueryRef = useRef({ page: 1, limit: 100, kind: '', trigger: '', status: '', library_id: '' });

  useEffect(() => { tokenRef.current = token; }, [token]);
  useEffect(() => { pollingRef.current = polling; }, [polling]);

  // ─── Status Helper ───
  const setStatus = useCallback((text, kind = '') => {
    const typeMap = { ok: 'success', err: 'error', warn: 'warning' };
    setStatusState({ text: text || '系统已就绪，等待操作', type: typeMap[kind] || 'info' });
  }, []);

  // ─── Theme ───
  useEffect(() => {
    localStorage.setItem('venera_admin_theme', themeMode);
  }, [themeMode]);

  // ─── Tab ───
  const handleTabChange = useCallback((tab) => {
    setActiveTab(tab);
    localStorage.setItem('venera_admin_tab', tab);
  }, []);

  // ─── Token ───
  const saveToken = useCallback(() => {
    localStorage.setItem('venera_admin_token', token.trim());
    setStatus('配置已保存', 'ok');
  }, [token, setStatus]);

  // ─── API Functions ───
  const refreshEhbotStatus = useCallback(async () => {
    try {
      const data = await fetchJSON('/api/v1/admin/ehbot/status', tokenRef.current);
      setEhbotStatus(data);
    } catch (err) {
      setEhbotStatus(null);
    }
  }, []);

  const loadEhbotConfig = useCallback(async () => {
    try {
      const data = await fetchJSON('/api/v1/admin/ehbot/config', tokenRef.current);
      setEhbotConfig(data);
    } catch (_) {}
  }, []);

  const refreshEhbotJobs = useCallback(async () => {
    try {
      const data = await fetchJSON('/api/v1/admin/ehbot/jobs', tokenRef.current);
      setEhbotJobs(data.items || []);
    } catch (_) {}
  }, []);

  const refreshMetaJobs = useCallback(async () => {
    setMetaJobsLoading(true);
    try {
      const data = await fetchJSON('/api/v1/admin/metadata/jobs', tokenRef.current);
      setMetaJobs(data.items || []);
    } catch (_) {}
    finally { setMetaJobsLoading(false); }
  }, []);

  const refreshSources = useCallback(async () => {
    try {
      const data = await fetchJSON('/api/v1/admin/metadata/sources', tokenRef.current);
      setSources(data.items || []);
      setSourceDir(data.directory || '');
    } catch (err) {
      setStatus(`加载数据源失败：${err.message}`, 'err');
    }
  }, [setStatus]);

  const refreshRecords = useCallback(async (overrides) => {
    if (overrides) recordQueryRef.current = { ...recordQueryRef.current, ...overrides };
    const q = recordQueryRef.current;
    setRecordsLoading(true);
    try {
      const params = new URLSearchParams({
        page: String(q.page || 1), limit: String(q.limit || 50),
        library_id: q.library_id || '', state: q.state || '', search: q.search || '',
      });
      const data = await fetchJSON(`/api/v1/admin/metadata/records?${params}`, tokenRef.current);
      setRecordItems(data.items || []);
      setRecordTotal(Number(data.total || 0));
      setRecordPage(Number(data.page || q.page || 1));
      setRecordPageSize(Number(data.page_size || q.limit || 50));
    } catch (err) {
      setStatus(err.message, 'err');
    } finally {
      setRecordsLoading(false);
    }
  }, [setStatus]);

  const refreshJobHistory = useCallback(async (overrides) => {
    if (overrides) historyQueryRef.current = { ...historyQueryRef.current, ...overrides };
    const q = historyQueryRef.current;
    setHistoryLoading(true);
    try {
      const params = new URLSearchParams({
        kind: q.kind || '', trigger: q.trigger || '', status: q.status || '',
        library_id: q.library_id || '', page: String(q.page || 1), limit: String(q.limit || 100),
      });
      const data = await fetchJSON(`/api/v1/admin/jobs?${params}`, tokenRef.current);
      setHistoryItems(data.items || []);
      setHistoryTotal(Number(data.total || 0));
      setHistoryPage(Number(data.page || q.page || 1));
      setHistoryPageSize(Number(data.page_size || q.limit || 100));
    } catch (err) {
      setStatus(`Job 历史加载失败：${err.message}`, 'err');
    } finally {
      setHistoryLoading(false);
    }
  }, [setStatus]);

  // ─── Sidecar ───
  const openSidecar = useCallback(async (record) => {
    const locator = record.locator;
    setSidecarLocator(locator);
    setSidecarItem(record);
    setSidecarInfo(null);
    setSidecarVisible(true);
    try {
      const params = new URLSearchParams(locator);
      const data = await fetchJSON(`/api/v1/admin/metadata/sidecar?${params}`, tokenRef.current);
      setSidecarInfo(data);
    } catch (err) {
      setStatus(`读取失败: ${err.message}`, 'err');
    }
  }, [setStatus]);

  const closeSidecar = useCallback(() => setSidecarVisible(false), []);

  // ─── Boot ───
  useEffect(() => {
    Promise.all([
      loadEhbotConfig(), refreshEhbotStatus(), refreshEhbotJobs(),
      refreshSources(), refreshMetaJobs(), refreshJobHistory(), refreshRecords(),
    ]).then(() => setStatus('控制面板初始化完成', 'ok'));
  }, []);

  // ─── Polling ───
  useEffect(() => {
    const fast = setInterval(() => {
      if (!pollingRef.current) return;
      refreshEhbotStatus();
      refreshEhbotJobs();
      refreshMetaJobs();
      refreshJobHistory();
    }, 3000);
    const slow = setInterval(() => {
      if (!pollingRef.current) return;
      refreshRecords();
    }, 8000);
    return () => { clearInterval(fast); clearInterval(slow); };
  }, [refreshEhbotStatus, refreshEhbotJobs, refreshMetaJobs, refreshJobHistory, refreshRecords]);

  // ─── Context ───
  const ctx = {
    tokenRef, setStatus,
    ehbotStatus, ehbotConfig, ehbotJobs, refreshEhbotStatus, refreshEhbotJobs, loadEhbotConfig,
    metaJobs, metaJobsLoading, refreshMetaJobs,
    sources, sourceDir, refreshSources,
    recordItems, recordTotal, recordPage, recordPageSize, recordsLoading, refreshRecords,
    selectedRecords, setSelectedRecords,
    historyItems, historyTotal, historyPage, historyPageSize, historyLoading, refreshJobHistory,
    polling, setPolling,
    openSidecar, closeSidecar,
    sidecarVisible, sidecarLocator, sidecarItem, sidecarInfo, setSidecarInfo,
  };

  const tabItems = [
    { key: 'bot', label: 'EH Bot', children: <EHBotPanel /> },
    { key: 'metadata', label: 'Metadata', children: <MetadataPanel /> },
    { key: 'jobs', label: 'Job History', children: <JobHistoryPanel /> },
  ];

  return (
    <ConfigProvider theme={{ algorithm: themeMode === 'dark' ? darkAlgorithm : defaultAlgorithm }}>
      <AppCtx.Provider value={ctx}>
        <Layout style={{ minHeight: '100vh' }}>
          <Header style={{
            height: 'auto', lineHeight: 'normal', padding: '16px 24px',
            position: 'sticky', top: 0, zIndex: 20,
            backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)',
          }}>
            <Flex justify="space-between" align="center" wrap="wrap" gap={12}>
              <div>
                <Title level={4} style={{ margin: 0 }}>Venera Metadata Admin</Title>
                <Text type="secondary">管理 metadata store、外部数据源，以及手动补全任务。</Text>
              </div>
              <Flex gap={8} wrap="wrap" align="center">
                <Text type="secondary">Bearer Token</Text>
                <Password value={token} onChange={(e) => setToken(e.target.value)} placeholder="填写服务 Token" style={{ width: 200 }} size="small" />
                <Button size="small" onClick={saveToken}>保存配置</Button>
                <Button size="small" onClick={() => setThemeMode(t => t === 'dark' ? 'light' : 'dark')}>
                  {themeMode === 'dark' ? '切换到浅色' : '切换到深色'}
                </Button>
                <Button size="small" onClick={() => { window.location.href = window.location.pathname; }}>切换到原版</Button>
              </Flex>
            </Flex>
          </Header>
          <Content style={{ padding: '24px', maxWidth: 1600, margin: '0 auto', width: '100%' }}>
            <Alert
              message={statusState.text}
              type={statusState.type}
              showIcon
              style={{ marginBottom: 16 }}
            />
            <Tabs activeKey={activeTab} onChange={handleTabChange} items={tabItems} />
          </Content>
        </Layout>
        <SidecarModal />
      </AppCtx.Provider>
    </ConfigProvider>
  );
};

/* ═══════════════════════════════════════════════════════════
   Mount
   ═══════════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
