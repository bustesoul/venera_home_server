name: Release Binaries

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: Optional release tag. Auto-generated when empty.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Compute release metadata
        id: meta
        uses: actions/github-script@v8
        with:
          script: |
            const inputTag = `${{ github.event.inputs.tag || '' }}`.trim();
            const shortSha = context.sha.slice(0, 7);
            const now = new Date();
            const stamp = now.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}Z$/, 'Z').replace('T', '-');
            const tag = inputTag || `build-${stamp}-${shortSha}`;
            core.setOutput('tag', tag);
            core.setOutput('release_name', `Release ${tag}`);

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            package_ext: tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            package_ext: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            package_ext: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux musl toolchain
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Set up Windows GCC
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc

      - name: Build Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="venera_home_server_${{ matrix.goos }}_${{ matrix.goarch }}"
          binary="venera_home_server${{ matrix.ext }}"
          mkdir -p "package/${asset_dir}"
          if [[ "${{ matrix.goos }}" == "linux" ]]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 CC=musl-gcc \
              go build -trimpath \
              -ldflags="-s -w -linkmode external -extldflags '-static'" \
              -o "package/${asset_dir}/${binary}" .
            file "package/${asset_dir}/${binary}"
            ldd "package/${asset_dir}/${binary}" || true
          else
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 \
              go build -trimpath -ldflags="-s -w" -o "package/${asset_dir}/${binary}" .
          fi
          cp README.md "package/${asset_dir}/README.md"
          cp server.example.toml "package/${asset_dir}/server.example.toml"
          cp openapi.yaml "package/${asset_dir}/openapi.yaml"

      - name: Build Windows binary
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          asset_dir="venera_home_server_${{ matrix.goos }}_${{ matrix.goarch }}"
          binary="venera_home_server${{ matrix.ext }}"
          mkdir -p "package/${asset_dir}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 CC=gcc CXX=g++ \
            go build -trimpath -ldflags="-s -w" -o "package/${asset_dir}/${binary}" .
          cp README.md "package/${asset_dir}/README.md"
          cp server.example.toml "package/${asset_dir}/server.example.toml"
          cp openapi.yaml "package/${asset_dir}/openapi.yaml"

      - name: Package tar.gz assets
        if: matrix.package_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="venera_home_server_${{ matrix.goos }}_${{ matrix.goarch }}"
          tar -C package -czf "${asset_dir}.tar.gz" "${asset_dir}"

      - name: Package zip assets
        if: matrix.package_ext == 'zip'
        shell: pwsh
        run: |
          $assetDir = "venera_home_server_${{ matrix.goos }}_${{ matrix.goarch }}"
          Compress-Archive -Path "package/$assetDir/*" -DestinationPath "$assetDir.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Ensure git tag exists
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha,
              });
            }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
